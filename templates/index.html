<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Gerador de Senhas Complexas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .range-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .results h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .password-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        
        .password-text {
            font-family: 'Monaco', 'Courier New', monospace;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            word-break: break-all;
            flex: 1;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        
        .copy-btn:hover {
            background: #764ba2;
        }
        
        .copy-btn.copied {
            background: #28a745;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Gerador de Senhas</h1>
        <p class="subtitle">Crie senhas complexas e seguras</p>
        
        <form id="passwordForm">
            <div class="form-group">
                <label>
                    Comprimento da senha
                    <span class="range-value"><span id="lengthValue">12</span> caracteres</span>
                </label>
                <input 
                    type="range" 
                    id="lengthRange" 
                    min="8" 
                    max="30" 
                    value="12" 
                    step="1"
                >
            </div>
            
            <div class="form-group">
                <label for="countInput">Quantidade de sugestões</label>
                <input 
                    type="number" 
                    id="countInput" 
                    min="1" 
                    max="10" 
                    value="3"
                >
            </div>
            
            <button type="submit" id="generateBtn">Gerar Senhas</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666; font-size: 14px;">Gerando senhas...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <h3>✅ Sugestões de senhas:</h3>
            <div id="passwordsList"></div>
        </div>
    </div>
    
    <script>
        const lengthRange = document.getElementById('lengthRange');
        const lengthValue = document.getElementById('lengthValue');
        const countInput = document.getElementById('countInput');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const passwordsList = document.getElementById('passwordsList');
        const form = document.getElementById('passwordForm');
        
        // Atualizar valor do range
        lengthRange.addEventListener('input', (e) => {
            lengthValue.textContent = e.target.value;
        });
        
        // Submeter formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await generatePasswords();
        });
        
        // Função para gerar senhas
        async function generatePasswords() {
            const length = parseInt(lengthRange.value);
            const count = parseInt(countInput.value);
            
            // Validações básicas
            if (length < 8 || length > 30) {
                showError('Comprimento deve estar entre 8 e 30');
                return;
            }
            
            if (count < 1 || count > 10) {
                showError('Quantidade deve estar entre 1 e 10');
                return;
            }
            
            // Mostrar loading
            loading.classList.add('show');
            error.classList.remove('show');
            results.classList.remove('show');
            generateBtn.disabled = true;
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        length: length,
                        count: count
                    })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || `Erro HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Mostrar resultados
                displayPasswords(data.passwords);
                results.classList.add('show');
                
            } catch (err) {
                console.error('Erro ao gerar senhas:', err);
                
                if (err.message === 'Failed to fetch') {
                    showError('Erro de conexão com o servidor. Verifique se o servidor está rodando em http://localhost:5000');
                } else {
                    showError(err.message);
                }
            } finally {
                loading.classList.remove('show');
                generateBtn.disabled = false;
            }
        }
        
        // Exibir senhas
        function displayPasswords(passwords) {
            passwordsList.innerHTML = '';
            passwords.forEach((password, index) => {
                const div = document.createElement('div');
                div.className = 'password-item';
                div.innerHTML = `
                    <span class="password-text">${escapeHtml(password)}</span>
                    <button type="button" class="copy-btn" onclick="copyToClipboard('${password}', this)">
                        Copiar
                    </button>
                `;
                passwordsList.appendChild(div);
            });
        }
        
        // Copiar para clipboard
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const original = button.textContent;
                button.textContent = 'Copiado! ✓';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = original;
                    button.classList.remove('copied');
                }, 2000);
            });
        }
        
        // Mostrar erro
        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('show');
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
